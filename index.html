<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT AI API66</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="ai-icon">🤖</div>

    <div class="title">BOT AI API66</div>

    <div class="subtitle">
        Artificial Intelligence • Smart Automation
    </div>

    <!-- TOMBOL GARANSI (BISA DIKLIK) -->
    <button class="garansi-btn" onclick="redirect()">
        🛡️ KLIK DI SINI - GARANSI 100% KALAU BONCOS
    </button>

    <button id="btn" class="btn" onclick="aktivasi()">
        🚀 AKTIVASI BOT AI API66
    </button>

    <div class="popup" id="popup">
        <h2 class="glow">✅ DAFTAR API66</h2>
        <p>GARANSI 100% JIKA BONCOS</p>
        <div class="loading">Redirecting...</div>
    </div>

</div>

<script>
const linkTujuan = "https://example.com";

function redirect(){
    window.location.href = linkTujuan;
}

function aktivasi(){

    const btn = document.getElementById("btn");
    const popup = document.getElementById("popup");

    popup.style.display = "block";

    btn.classList.add("success");
    btn.innerHTML = "✅ AKTIVASI BERHASIL";
    btn.disabled = true;

    setTimeout(() => {
        window.location.href = linkTujuan;
    }, 1000);
}
</script>

</body>
</html>
